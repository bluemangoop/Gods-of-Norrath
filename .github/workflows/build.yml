name: Build & Release Patcher

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Server Name'
        required: false
        default: 'My Server'
      filelist_url:
        description: 'File List URL'
        required: false
        default: 'https://example.com/filelist.yml'
      patcher_url:
        description: 'Patcher URL'
        required: false
        default: 'https://example.com'
      file_name:
        description: 'File Name'
        required: false
        default: 'godsofnorrath-test.exe'
      version:
        description: 'Version'
        required: false
        default: '1.0.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore "EQEmu Patcher/EQEmu Patcher.sln"

    - name: Build (Debug)
      run: msbuild "EQEmu Patcher/EQEmu Patcher.sln" /p:Configuration=Debug /p:Platform="x86"
      env:
        SERVER_NAME: ${{ github.event.inputs.server_name || 'Gods of Norrath' }}
        FILELIST_URL: ${{ github.event.inputs.filelist_url || 'http://108.181.218.166/patch/rof/' }}
        PATCHER_URL: ${{ github.event.inputs.patcher_url || 'http://108.181.218.166/patch/rof/' }}
        FILE_NAME: ${{ github.event.inputs.file_name || 'godsofnorrath-test' }}
        VERSION: ${{ github.event.inputs.version || '1.0.0.0' }}

    - name: Build (Release)
      run: msbuild "EQEmu Patcher/EQEmu Patcher.sln" /p:Configuration=Release /p:Platform="x86"
      env:
        SERVER_NAME: ${{ github.event.inputs.server_name || 'Gods of Norrath' }}
        FILELIST_URL: ${{ github.event.inputs.filelist_url || 'http://108.181.218.166/patch/rof/' }}
        PATCHER_URL: ${{ github.event.inputs.patcher_url || 'http://108.181.218.166/patch/rof/' }}
        FILE_NAME: ${{ github.event.inputs.file_name || 'godsofnorrath-test' }}
        VERSION: ${{ github.event.inputs.version || '1.0.0.0' }}

    - name: Upload artifact (Debug)
      uses: actions/upload-artifact@v4
      with:
        name: godsofnorrath-test-debug
        path: "EQEmu Patcher/EQEmu Patcher/bin/Debug/"

    - name: Upload artifact (Release)
      uses: actions/upload-artifact@v4
      with:
        name: godsofnorrath-test-release
        path: "EQEmu Patcher/EQEmu Patcher/bin/Release/"

    # Only create a release on push to main (not on pull requests)
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "v${{ github.run_number }}"
        body: |
          Auto-built from commit ${{ github.sha }}
          
          Built by GitHub Actions run #${{ github.run_number }}
        files: |
          EQEmu Patcher/EQEmu Patcher/bin/Release/godsofnorrath-test.exe
        generate_release_notes: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
