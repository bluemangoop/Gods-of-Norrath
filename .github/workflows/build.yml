name: Build & Release Patcher

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Server Name'
        required: false
        default: 'My Server'
      filelist_url:
        description: 'File List URL'
        required: false
        default: 'https://example.com/filelist.yml'
      patcher_url:
        description: 'Patcher URL'
        required: false
        default: 'https://example.com'
      file_name:
        description: 'File Name'
        required: false
        default: 'godsofnorrath.exe'
      version:
        description: 'Version'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore "EQEmu Patcher/EQEmu Patcher.sln"

    # Extract version from csproj file
    - name: Extract version from csproj
      id: get_version
      shell: pwsh
      run: |
        $csproj = "EQEmu Patcher/EQEmu Patcher/eqemupatcher.csproj"
        $content = Get-Content $csproj -Raw
        $match = [regex]::Match($content, '<ApplicationVersion>([^<]+)</ApplicationVersion>')
        if ($match.Success) {
          $version = $match.Groups[1].Value
          Write-Host "Version from csproj: $version"
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } else {
          Write-Host "Could not extract version from csproj, using default"
          echo "version=1.0.0.0" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }

    - name: Build (Debug)
      run: msbuild "EQEmu Patcher/EQEmu Patcher.sln" /p:Configuration=Debug /p:Platform="Any CPU"
      env:
        SERVER_NAME: ${{ github.event.inputs.server_name || 'Gods of Norrath' }}
        FILELIST_URL: ${{ github.event.inputs.filelist_url || 'https://godsofnorrath.online/patch/rof/' }}
        PATCHER_URL: ${{ github.event.inputs.patcher_url || 'https://godsofnorrath.online/patch/rof/' }}
        FILE_NAME: ${{ github.event.inputs.file_name || 'godsofnorrath' }}
        VERSION: ${{ github.event.inputs.version || steps.get_version.outputs.version }}

    - name: Build (Release)
      run: msbuild "EQEmu Patcher/EQEmu Patcher.sln" /p:Configuration=Release /p:Platform="Any CPU"
      env:
        SERVER_NAME: ${{ github.event.inputs.server_name || 'Gods of Norrath' }}
        FILELIST_URL: ${{ github.event.inputs.filelist_url || 'https://godsofnorrath.online/patch/rof/' }}
        PATCHER_URL: ${{ github.event.inputs.patcher_url || 'https://godsofnorrath.online/patch/rof/' }}
        FILE_NAME: ${{ github.event.inputs.file_name || 'godsofnorrath' }}
        VERSION: ${{ github.event.inputs.version || steps.get_version.outputs.version }}

    - name: Upload artifact (Debug)
      uses: actions/upload-artifact@v4
      with:
        name: godsofnorrath-debug
        path: "EQEmu Patcher/EQEmu Patcher/bin/Debug/"

    - name: Upload artifact (Release)
      uses: actions/upload-artifact@v4
      with:
        name: godsofnorrath-release
        path: "EQEmu Patcher/EQEmu Patcher/bin/Release/"

    # Create a release on every push to main
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version || steps.get_version.outputs.version }}
        name: "v${{ github.event.inputs.version || steps.get_version.outputs.version }}"
        body: |
          Auto-built from commit ${{ github.sha }}
          
          Version: ${{ github.event.inputs.version || steps.get_version.outputs.version }}
        files: |
          EQEmu Patcher/EQEmu Patcher/bin/Release/godsofnorrath.exe
        generate_release_notes: false
        make_latest: true
      env:
        GITH
