name: Build Patcher

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Server Name'
        required: false
        default: 'My Server'
      filelist_url:
        description: 'File List URL'
        required: false
        default: 'https://example.com/filelist.yml'
      patcher_url:
        description: 'Patcher URL'
        required: false
        default: 'https://example.com'
      file_name:
        description: 'File Name'
        required: false
        default: 'eqemupatcher.exe'
      version:
        description: 'Version'
        required: false
        default: '1.0.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore "EQEmu Patcher/EQEmu Patcher.sln"

    - name: Build (Debug)
      run: msbuild "EQEmu Patcher/EQEmu Patcher.sln" /p:Configuration=Debug /p:Platform="Any CPU"
      env:
        SERVER_NAME: ${{ github.event.inputs.server_name || 'My Server' }}
        FILELIST_URL: ${{ github.event.inputs.filelist_url || 'https://example.com/filelist.yml' }}
        PATCHER_URL: ${{ github.event.inputs.patcher_url || 'https://example.com' }}
        FILE_NAME: ${{ github.event.inputs.file_name || 'eqemupatcher.exe' }}
        VERSION: ${{ github.event.inputs.version || '1.0.0.0' }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: eqemupatcher-debug
        path: "EQEmu Patcher/EQEmu Patcher/bin/Debug/"
